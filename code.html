<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
        <title>AstralX</title>
    </head>
    <body>
        <header class="upper-header">
            <div class="visualizer">Score: <span class="score">0</span></div>
            <span class="player-name"></span>
            <section class="level-area">
                <div class="lvl">Level: <span class="lvl-score">1</span></div>
                <div class="bar"><div class="xp"></div></div>
            </section>
        </header>
        <header class="lower-header">
            <section class="hp-area">
            <div class="hp">Health</div>
            <div class="hp-bar"><div class="hp-xp"></div></div>
            <div class="hp"><span class="hp-points">20</span>/20</div>
            </section>
            <section class="position">X: <span class="x-pos"></span> Y: <span class="y-pos"></span></section>
            <span class="game-name">AstralX</span>
        </header>
        <div class="box"></div>
        <main class="orientation">
            <div class="logo">
                <span class="game-logo">AstralX</span>
                <span class="creator">by Marwan</span>
            </div>
            <div class="click">Click anywhere to continue!</div>
            <img class="player-input" src="sprites/nameinput.png">
            <input class="name-input" type="text" placeholder="Player name">
            <button class="game-start">Enter</button>
        </main>
        <div class="dark-area">
            <div class="pause-area">
               <span class="pause-style">Game paused</span>
               <div class="choice"><button class="continue">Continue</button>
                <button class="main-screen">Main screen</button></div>
            </div>
        </div>
        <div class="upper-transition"></div>
        <div class="lower-transition"></div>
        <div class="game-controller">

        <script src="script.js"></script>
    </body>
</html>
